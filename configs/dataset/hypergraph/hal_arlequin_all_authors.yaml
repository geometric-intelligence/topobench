# Dataset loader config
loader:
  _target_: topobench.data.loaders.HALArlequinDatasetLoader
  parameters:
    data_domain: hypergraph
    data_type: academic
    data_name: HALArlequin
    data_dir: ${paths.data_dir}/${dataset.loader.parameters.data_domain}/${dataset.loader.parameters.data_type}
    # Hypergraph construction parameters
    max_rank: 4
    cluster_seed: 42
    neighborhoods: ${oc.select:model.backbone.neighborhoods,null}
    # Semantic hyperedge clustering parameters
    semantic_cluster_algorithm: spherical_kmeans
    semantic_kmeans_k: 10
    semantic_kmeans_n_init: 1
    # Higher order structure initialization method: "avg_doc" or "one_hot"
    ho_init_method: avg_doc
    # Author hyperedge filtering: min papers for an author to get a hyperedge
    min_papers_per_author: 2
    # Institution granularity: "researchteam", "laboratory", or "institution"
    institution_level: laboratory
    # Prediction task: all-author multilabel classification
    # Labels are binary vectors of length num_classes (one entry per vocabulary author).
    # Vocabulary authors are those with >= min_papers_per_author papers (same filter
    # as the author hyperedges), so the label space is consistent with the graph structure.
    prediction_task: all_authors
    # Not used for all_authors task
    min_papers_per_first_author: null
    # Keyword hyperedges at rank 4: each keyword groups papers that share it.
    # Requires max_rank: 4 (set below).
    use_keyword_hyperedges: true
    min_papers_per_keyword: 2

# Dataset parameters
parameters:
  num_features: [1024, 1024, 1024, 1024, 1024]
  # num_classes = number of vocabulary authors (those with >= min_papers_per_author papers).
  # Verified from the enriched parquet: 70 authors with >= 2 papers across 116 documents.
  num_classes: 70
  task: multilabel classification
  loss_type: focal
  focal_gamma: 2.0     # focusing parameter: higher = more down-weighting of easy negatives
  focal_alpha: null    # optional per-class prior: scalar in (0,1) or null to disable
  monitor_metric: f1_macro
  metrics: [f1_macro]
  task_level: node

#splits
split_params:
  learning_setting: transductive
  data_split_dir: ${paths.data_dir}/data_splits/${dataset.loader.parameters.data_name}
  data_seed: 0
  split_type: random
  k: 10
  train_prop: 0.8

# Dataloader parameters
dataloader_params:
  batch_size: 1
  num_workers: 1
  pin_memory: False
