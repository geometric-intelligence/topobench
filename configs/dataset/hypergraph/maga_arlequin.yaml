# Dataset loader config
loader:
  _target_: topobench.data.loaders.MAGAArlequinDatasetLoader
  parameters: 
    data_domain: hypergraph
    data_type: social
    data_name: MAGAArlequin
    data_dir: ${paths.data_dir}/${dataset.loader.parameters.data_domain}/${dataset.loader.parameters.data_type}
    # Hypergraph construction parameters
    cluster_level_posts: -2
    cluster_level_users: 0
    max_rank: 4
    cluster_seed: 42
    neighborhoods: ${oc.select:model.backbone.neighborhoods,null}
    # Semantic hyperedge clustering parameters
    semantic_cluster_algorithm: spherical_kmeans
    semantic_kmeans_k: 10
    semantic_kmeans_n_init: 1
    # Higher order structure initialization method: "bio" (default) or "avg_post"
    ho_init_method: avg_post
    # Filter out users with more than this many posts (null = no filter)
    max_posts_per_user: 1000

# Dataset parameters
parameters:
  num_features: [1024, 1024, 1024, 1024, 10]
  num_classes: 10
  task: classification
  loss_type: cross_entropy
  monitor_metric: accuracy
  task_level: node

#splits
split_params:
  learning_setting: transductive
  data_split_dir: ${paths.data_dir}/data_splits/${dataset.loader.parameters.data_name}
  data_seed: 0
  split_type: random #'k-fold' # either "k-fold" or "random" strategies
  k: 10 # for "k-fold" Cross-Validation
  train_prop: 0.8 # for "random" strategy splitting

# Dataloader parameters
dataloader_params:
  batch_size: 1 # Fixed
  num_workers: 1
  pin_memory: False
