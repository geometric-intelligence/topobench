# Streamlit Configuration for External Access

[server]
# Auto-reload when source files change
runOnSave = true
fileWatcherType = "auto"
address = "0.0.0.0"
port = 8501
headless = true
enableCORS = false
enableXsrfProtection = true
maxUploadSize = 200

[browser]
gatherUsageStats = false

[logger]
level = "info"
