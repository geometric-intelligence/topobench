name: "Docs: Check and Deploy"

on:
  push:
    branches: [main, github-actions-test]
  pull_request:
    branches: [main]

concurrency:
  group: topobench-docs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      # 1. Setup uv
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      # 2. Run your centralized installation script
      - name: Install dependencies (via script)
        run: |
          # This installs '.[all]' which includes doc dependencies
          source uv_env_setup.sh

      # 3. Install System Dependencies
      - name: Install Pandoc
        run: sudo apt-get -y install pandoc

      # 4. Generate Docs
      - name: Generate API Documentation
        run: |
          source .venv/bin/activate
          cd docs
          bash generate_api_docs.sh

      - name: Generate Docs [Sphinx]
        run: |
          source .venv/bin/activate
          sphinx-build -b html -D version=latest -D release=latest docs docs/_build
          # Ensure GitHub Pages serves _static, _sources, etc. (see DOCUMENTATION_SITE.md).
          touch docs/_build/.nojekyll

      # 5. Deploy
      - name: Ensure .nojekyll at org Pages repo root
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && github.repository == 'geometric-intelligence/TopoBench' }}
        run: |
          REPO_URL="https://x-access-token:${{ secrets.DOCUMENTATION_KEY }}@github.com/geometric-intelligence/geometric-intelligence.github.io.git"
          git clone --depth 1 "$REPO_URL" /tmp/org-pages
          if [ ! -f /tmp/org-pages/.nojekyll ]; then
            touch /tmp/org-pages/.nojekyll
            cd /tmp/org-pages
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .nojekyll
            git commit -m "chore: add .nojekyll to prevent Jekyll from ignoring _static dirs"
            git push
          fi
          rm -rf /tmp/org-pages

      - name: Deploy Docs
        uses: JamesIves/github-pages-deploy-action@v4
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && github.repository == 'geometric-intelligence/TopoBench' }}
        with:
          branch: main
          folder: docs/_build
          token: ${{ secrets.DOCUMENTATION_KEY }}
          repository-name: geometric-intelligence/geometric-intelligence.github.io
          target-folder: topobench
          clean: true
